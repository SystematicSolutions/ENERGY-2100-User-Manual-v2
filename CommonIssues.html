/* =========================================================
   1) BASE PAGE
   ========================================================= */

/* =========================================================
   10) COLLAPSIBLE NOTE-STYLE BOX
   ========================================================= */

details.hnd-blue-callout {
  margin: 14px 0 !important;

  transform: translateX(48px);
  width: calc(100% - 48px) !important;
  max-width: calc(100% - 48px) !important;

  box-sizing: border-box !important;

  border: 1px solid #e5e7eb;
  border-left: 4px solid #2b9af3;
  border-radius: 10px;
  background: transparent;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.025);
}

/* Header (summary) */
details.hnd-blue-callout > summary {
  list-style: none;
  cursor: pointer;
  padding: 12px 14px;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #111827;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}

details.hnd-blue-callout > summary::-webkit-details-marker {
  display: none;
}

/* Info icon (matches Note box) */
details.hnd-blue-callout > summary::before {
  content: "i";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  font-size: 12px;
  font-weight: 600;
  color: #ffffff;
  background: #2b9af3;
  border-radius: 50%;
}

/* Arrow */
details.hnd-blue-callout > summary::after {
  content: "▸";
  margin-left: auto;
  font-size: 18px;
  color: #4b5563;
  transition: transform 0.18s ease;
}

details.hnd-blue-callout[open] > summary::after {
  transform: rotate(90deg);
}

/* Body */
details.hnd-blue-callout .callout-body {
  padding: 0 14px 12px 14px;
}

details.hnd-blue-callout p {
  margin: 0 0 6px 0;
  color: #374151;
  font-size: 14px;
  line-height: 1.5;
}

details.hnd-blue-callout p:last-child {
  margin-bottom: 0;
}

/* Code inside collapsible (match your other code blocks) */
details.hnd-blue-callout pre {
  margin: 8px 0 10px 0;
  padding: 10px 14px;
  background: #f7f9fb;
  border: 1px solid #dde3ea;
  border-radius: 8px;
  overflow-x: auto;
  white-space: pre;
  font-family: Consolas, "Courier New", monospace;
  font-size: 14px;
  line-height: 1.25;
}

details.hnd-blue-callout > summary:hover {
  background: #f9fafb;
}

  padding: 4px 8px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: #ffffff;
  color: #374151;
  cursor: pointer;
  opacity: 0.92;
}

.copy-code-btn:hover {
  background: #f3f4f6;
}

.copy-code-btn.copied {
  color: #065f46;
  border-color: #a7f3d0;
  background: #ecfdf5;
}


/* =========================================================
   12) RESPONSIVE
   ========================================================= */

@media (max-width: 1200px) {
  #right-nav {
    display: none;
  }

  body {
    margin-right: 0;
  }
}


/* =========================================================
   13) HELPER CLASSES
   ========================================================= */

.code-block {
  margin-left: 0;
}

.indent-1 { margin-left: 20px; }
.indent-2 { margin-left: 48px; }
.indent-3 { margin-left: 60px; }

.code-indent {
  margin-left: 40px;
  max-width: calc(100% - 40px);
}

pre code {
  padding: 0;
  background: transparent;
}

code {
  font-family: Consolas, "Courier New", monospace;
  font-size: 0.95em;
  background: #f3f4f6;
  color: #111827;
  padding: 2px 5px;
  border-radius: 4px;
  line-height: 1;
}

.html-code-box {
  width: auto;
  max-width: 100%;
  box-sizing: border-box;
}

.html-code-box.indent-1 { margin-left: 20px !important; }
.html-code-box.indent-2 { margin-left: 48px !important; }
.html-code-box.indent-3 { margin-left: 68px !important; }


/* =========================================================
   14) EMPTY PARAGRAPH CLEANUP
   ========================================================= */

table td p:empty,
table td p:has(br:only-child) {
  display: none;
}

table:has(td[style*="background-color: #cc99ff"]) td:last-child p:empty,
table:has(td[style*="background-color: #cc99ff"]) td:last-child p:has(br:only-child) {
  display: none !important;
}


/* =========================================================
   15) HTML CODE BOXES INSIDE EXERCISES
   ========================================================= */

table:has(td[style*="background-color: #cc99ff"]) td:last-child .html-code-box {
  margin-top: 6px !important;
}


/* =========================================================
   16) COLLAPSIBLE EXERCISE BOXES
   ========================================================= */

details.example-toggle {
  margin: 0;
}

details.example-toggle > summary {
  list-style: none;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  color: #6b21a8;
  line-height: 1.3;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}

details.example-toggle > summary::-webkit-details-marker {
  display: none;
}

details.example-toggle > summary::before {
  content: "▸";
  font-size: 12px;
  color: #6b21a8;
  transition: transform 0.18s ease;
  margin-right: 2px;
}

details.example-toggle[open] > summary::before {
  transform: rotate(90deg);
}

details.example-toggle > summary::after {
/*  content: "📚";*/
  font-size: 14px;
  margin-left: 2px;
  margin-right: 2px;
}

details.example-toggle p:first-child::before {
  content: none !important;
}

details.example-toggle > *:not(summary) {
  margin-top: 8px;
}

details.example-toggle .html-code-box {
  margin-top: 6px;
}

/* =========================================================
   17) CODE LABELS
   ========================================================= */

.code-label {
  display: block !important;
  font-size: 12px;
  font-weight: 500;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 12px 0 6px 2px !important;
  white-space: normal !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  overflow: visible !important;
  padding: 0 !important;
}

.html-code-box + .code-label {
  margin-top: 14px !important;
}

/* =========================================================
   18) FINAL CODE SPACING SYSTEM (v10.1 CLEAN)
   ========================================================= */

/* Base <pre> fallback */
pre {
  line-height: 1.4;
  padding: 10px 14px;
}

/* Main HTML code boxes */
.html-code-box pre {
  margin: 0;
  padding: 12px 16px !important;
  font-size: 14.5px;
  line-height: 1.55 !important;
}

.html-code-box code {
  display: block;
  line-height: inherit !important;
}

/* Code inside exercise tables */
table:has(td[style*="background-color: #cc99ff"]) td:last-child pre,
table:has(td[style*="background-color: #cc99ff"]) td:last-child .html-code-box pre,
table:has(td[style*="background-color: #00c030"]) td:last-child pre,
table:has(td[style*="background-color: #00c030"]) td:last-child .html-code-box pre {
  line-height: 1.55 !important;
  padding: 12px 16px !important;
}

table:has(td[style*="background-color: #cc99ff"]) td:last-child code,
table:has(td[style*="background-color: #00c030"]) td:last-child code {
  line-height: inherit !important;
}

/* Collapsible callout code */
details.hnd-blue-callout pre {
  line-height: 1.4;
  padding: 10px 14px;
}

details.hnd-blue-callout code {
  line-height: inherit !important;
}

/* Syntax color */
.kw {
  color: #AF00DB;
  font-weight: 500;
}</style>
